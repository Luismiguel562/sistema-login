<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<title>Login</title>
</head>

<body>

<header class="navbar">

<div class="menu-icon">☰</div>
<div class="logo">Minha Empresa</div>

<div class="nav-links">
<a href="#">Contato</a>
<a href="#">Sobre</a>
</div>

</header>

<div class="login-box">

<h1>Login</h1>

<form id="loginForm">

<label for="usuario">Usuário</label>
<br>
<input id="usuario" type="text" placeholder="Digite seu usuário" required>

<br><br>

<label for="senha">Senha</label>
<br>
<input id="senha" type="password" placeholder="Digite sua senha" required>

<br><br>

<button type="submit">Login</button>

<p>Não possui conta?
<a href="cadastro.html">Registre-se</a>
</p>

</form>

</div>

<script src="login.js"></script>

</body>
</html>
