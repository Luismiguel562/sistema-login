<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Registre-se</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="navbar">

<div class="menu-icon">☰</div>

<div class="logo">Minha Empresa</div>

<div class="nav-links">
<a href="#">Contato</a>
<a href="#">Sobre</a>
</div>

</header>

<div class="login-box">

<h1>Cadastro</h1>

<form id="cadastroForm">

<label for="usuario">Usuário</label>
<input id="novoUsuario" type="text" placeholder="Digite seu usuário" required>

<label for="email">Email</label>
<input id="email" type="email" placeholder="Digite seu email" required>

<label for="senha">Senha</label>
<input id="novaSenha" type="password" placeholder="Crie uma senha" required>

<button type="submit">Cadastrar</button>

<p>Já possui conta?
<a href="index.html">Faça login</a>
</p>

</form>

</div>

<script src="cadastro.js"></script>

</body>
</html>
